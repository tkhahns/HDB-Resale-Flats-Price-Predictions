name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short

  integration:
    name: Synthetic pipeline integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run synthetic pipeline
        run: python -m src.avm.pipeline --all --synthetic --run-date 2026-01-01
      - name: Assert expected artifacts exist
        run: |
          python - <<'EOF'
          import json, sys
          from pathlib import Path

          prefix = Path("models/date=2026-01-01")
          reports = Path("reports/date=2026-01-01")
          latest = Path("models/latest.json")

          required_model = ["avm_ensemble.pkl", "preprocessor.pkl", "feature_names.json", "manifest.json"]
          required_reports = [
              "model_metrics.csv", "feature_importance.csv", "validation_report.html",
              "backtest_metrics.csv", "collinearity_report.csv",
          ]

          missing = []
          for f in required_model:
              if not (prefix / f).exists():
                  missing.append(str(prefix / f))
          for f in required_reports:
              if not (reports / f).exists():
                  missing.append(str(reports / f))
          if not latest.exists():
              missing.append(str(latest))

          if missing:
              print("MISSING ARTIFACTS:")
              for m in missing:
                  print(f"  {m}")
              sys.exit(1)

          # Verify latest.json is valid and points to the right prefix
          data = json.loads(latest.read_text())
          assert data["model_prefix"] == "models/date=2026-01-01", data
          assert "metrics" in data
          print(f"All artifacts present. MAE={data['metrics']['MAE']:.0f}")
          EOF

  docker-build:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build base image
        run: docker build -f docker/Dockerfile.base -t hdb-avm-base:ci .
      - name: Build batch image
        run: docker build -f docker/Dockerfile.batch --build-arg BASE_IMAGE=hdb-avm-base:ci -t hdb-avm-batch:ci .
      - name: Build api image
        run: docker build -f docker/Dockerfile.api --build-arg BASE_IMAGE=hdb-avm-base:ci -t hdb-avm-api:ci .
      - name: Smoke test batch container (synthetic)
        run: |
          docker run --rm hdb-avm-batch:ci --all --synthetic --run-date 2026-01-01
      - name: Smoke test API container (/healthz)
        run: |
          docker run -d --name avm-api-ci -p 8080:8080 hdb-avm-api:ci
          sleep 5
          curl -f http://localhost:8080/healthz
          docker stop avm-api-ci
